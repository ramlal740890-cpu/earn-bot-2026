<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 Admin Dashboard | Earn Bot</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1, h2, h3 { text-align: center; color: #1e3c72; margin-bottom: 20px; }
        .login-section { text-align: center; margin-bottom: 30px; }
        .dashboard { display: none; }
        .stats-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stats-card p { margin: 8px 0; font-size: 16px; }
        .stats-card strong { color: #2a5298; }
        .user-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }
        .user-item {
            border-bottom: 1px solid #eee;
            padding: 8px;
            font-size: 14px;
        }
        .user-item:last-child { border-bottom: none; }
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 10px;
            font-family: inherit;
        }
        button, .back-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: background 0.3s;
            width: 100%;
        }
        button:hover { background: #1e3c72; }
        .error { color: red; text-align: center; margin-top: 10px; }
        .success { color: green; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 Admin Dashboard – Earn Bot</h1>
    <div class="login-section" id="loginSection">
        <p>Admin login required</p>
        <div id="telegram-login"></div>
    </div>
    <div id="adminDashboard" class="dashboard">
        <h2>📊 Total Stats</h2>
        <div id="adminStats" class="stats-card">Loading...</div>

        <h3>📢 Broadcast Message</h3>
        <div id="adminBroadcast">
            <textarea id="broadcastMsg" rows="4" placeholder="Type your message here..."></textarea>
            <button onclick="sendBroadcast()">Send to All Users</button>
            <div id="broadcastResult"></div>
        </div>

        <h3>👥 All Users</h3>
        <div id="userList">
            <div id="usersContainer" class="user-list">Loading...</div>
        </div>
        <button class="back-btn" onclick="logout()">Logout</button>
    </div>
</div>

<script>
    // ====================== FIREBASE CLIENT CONFIG ======================
    // 🔁 REPLACE WITH YOUR OWN FIREBASE WEB APP CONFIG
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "earn-bot-2026",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ====================== CONSTANTS ======================
    const ADMIN_ID = "8711347335";  // 🔁 YOUR ADMIN TELEGRAM ID
    let currentUserId = null;

    // ====================== HELPER FUNCTIONS ======================
    async function loadAdminDashboard() {
        try {
            const usersSnapshot = await db.collection('users').get();
            let totalUsers = 0;
            let totalBalance = 0;
            let totalRefers = 0;
            const usersList = [];
            usersSnapshot.forEach(doc => {
                const data = doc.data();
                totalUsers++;
                totalBalance += data.balance || 0;
                totalRefers += data.totalRefers || 0;
                usersList.push({
                    id: doc.id,
                    name: data.name || 'Unknown',
                    balance: data.balance || 0,
                    refers: data.totalRefers || 0
                });
            });
            document.getElementById('adminStats').innerHTML = `
                <p><strong>👥 Total Users:</strong> ${totalUsers}</p>
                <p><strong>💰 Total Balance:</strong> ${totalBalance} coins</p>
                <p><strong>👥 Total Refers:</strong> ${totalRefers}</p>
            `;
            // Render user list
            let usersHtml = '';
            usersList.forEach(user => {
                usersHtml += `<div class="user-item">
                    <strong>${escapeHtml(user.name)}</strong> (${user.id})<br>
                    Balance: ${user.balance} | Refers: ${user.refers}
                </div>`;
            });
            document.getElementById('usersContainer').innerHTML = usersHtml || '<p>No users found.</p>';
        } catch (error) {
            console.error("Error loading admin data:", error);
            document.getElementById('adminStats').innerHTML = '<p class="error">Failed to load stats.</p>';
            document.getElementById('usersContainer').innerHTML = '<p class="error">Failed to load users.</p>';
        }
    }

    async function sendBroadcast() {
        const msg = document.getElementById('broadcastMsg').value.trim();
        if (!msg) {
            alert("Please enter a message.");
            return;
        }
        const resultDiv = document.getElementById('broadcastResult');
        resultDiv.innerHTML = '<p>Sending...</p>';

        // 🔁 REPLACE WITH YOUR BACKEND ENDPOINT URL (e.g., Vercel function)
        const backendUrl = "https://your-backend-url.vercel.app/api/broadcast";
        try {
            const response = await fetch(backendUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: msg,
                    adminId: currentUserId  // Will be validated on backend
                })
            });
            const result = await response.json();
            if (response.ok) {
                resultDiv.innerHTML = `<p class="success">✅ Broadcast sent to ${result.sent} users.</p>`;
            } else {
                resultDiv.innerHTML = `<p class="error">❌ ${result.error || 'Unknown error'}</p>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<p class="error">⚠️ Error: ${err.message}. Make sure your backend is running and accessible.</p>`;
        }
    }

    function logout() {
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('adminDashboard').style.display = 'none';
        currentUserId = null;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ====================== TELEGRAM LOGIN CALLBACK ======================
    window.onTelegramAuth = function(user) {
        currentUserId = user.id.toString();
        if (currentUserId !== ADMIN_ID) {
            alert("⛔ Access denied. You are not an admin.");
            logout();
            return;
        }
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminDashboard').style.display = 'block';
        loadAdminDashboard();
    };

    // ====================== INITIALIZE TELEGRAM WIDGET ======================
    (function() {
        const script = document.createElement('script');
        script.src = "https://telegram.org/js/telegram-widget.js?22";
        script.setAttribute('data-telegram-login', 'YourBotUsername'); // 🔁 REPLACE
        script.setAttribute('data-size', 'large');
        script.setAttribute('data-request-access', 'write');
        script.setAttribute('data-onauth', 'onTelegramAuth(user)');
        document.getElementById('telegram-login').appendChild(script);
    })();
</script>
</body>
</html>
