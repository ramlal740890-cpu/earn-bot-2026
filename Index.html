<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Bot 2026 Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #121212; color: white; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 1px solid #333; }
        .balance-card { background: linear-gradient(135deg, #0088cc, #005588); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .balance-label { font-size: 14px; opacity: 0.8; }
        .balance-value { font-size: 32px; font-weight: bold; margin: 5px 0; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: #333; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 14px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn:active { transform: scale(0.95); }
        .btn i { font-size: 20px; margin-bottom: 5px; }
        .btn-main { grid-column: span 2; background: #0088cc; font-weight: bold; }
        .status { margin-top: 15px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h3 id="welcomeMsg">Namaste!</h3>
    
    <div class="balance-card">
        <div class="balance-label">Aapka Total Balance</div>
        <div class="balance-value">₹ <span id="userBalance">0.00</span></div>
    </div>

    <div class="btn-grid">
        <button class="btn btn-main" onclick="handleAction('DAILY_CLAIM')">🎁 Daily Bonus Claim</button>
        <button class="btn" onclick="handleAction('VIDEO_REWARD')">📺 Watch Video</button>
        <button class="btn" onclick="copyRefer()">🔗 Invite Friends</button>
        <button class="btn" onclick="tg.close()">❌ Exit App</button>
    </div>

    <div class="status" id="statusMsg">Firebase connecting...</div>
</div>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBxvacIBGHZdQ8HTgHLGku45oEHaVTyRt8",
        authDomain: "earn-bot-2026.firebaseapp.com",
        projectId: "earn-bot-2026",
        storageBucket: "earn-bot-2026.firebasestorage.app",
        messagingSenderId: "519698784421",
        appId: "1:519698784421:web:c932e8ced59c4db1b06d4c"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. Telegram WebApp Init
    let tg = window.Telegram.WebApp;
    tg.expand();
    const userId = tg.initDataUnsafe?.user?.id?.toString() || "test_user";
    const firstName = tg.initDataUnsafe?.user?.first_name || "Guest";

    document.getElementById('welcomeMsg').innerText = `Namaste, ${firstName}!`;

    // 3. Real-time Balance Sync
    if (userId) {
        db.collection("users").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                document.getElementById('userBalance').innerText = doc.data().balance || 0;
                document.getElementById('statusMsg').innerText = "✅ Data Synced Successfully";
            } else {
                document.getElementById('statusMsg').innerText = "❌ User account not found in DB";
            }
        });
    }

    // 4. Handle Actions (Send to Bot)
    function handleAction(actionType) {
        const data = JSON.stringify({ action: actionType });
        tg.sendData(data); // Ye bot logic ko trigger karega
        document.getElementById('statusMsg').innerText = "Processing request...";
    }

    function copyRefer() {
        const link = `https://t.me/Earn_Cash_Rewards_bot?start=${userId}`;
        navigator.clipboard.writeText(link);
        alert("Refer link copy ho gaya!");
    }
</script>

</body>
</html>
