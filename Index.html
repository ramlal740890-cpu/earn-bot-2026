<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 User Dashboard | Earn Bot</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1, h2 { text-align: center; color: #1e3c72; margin-bottom: 20px; }
        .login-section { text-align: center; margin-bottom: 30px; }
        .dashboard { display: none; }
        .stats-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stats-card p { margin: 8px 0; font-size: 16px; }
        .stats-card strong { color: #2a5298; }
        .referral-link {
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
            word-break: break-all;
            font-family: monospace;
        }
        button, .back-btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: background 0.3s;
            width: 100%;
        }
        button:hover { background: #1e3c72; }
        .error { color: red; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>💰 Earn Bot – User Dashboard</h1>
    <div class="login-section" id="loginSection">
        <p>Login with Telegram to view your stats</p>
        <!-- Telegram Login Widget -->
        <div id="telegram-login"></div>
    </div>
    <div id="userDashboard" class="dashboard">
        <h2>📊 Your Dashboard</h2>
        <div id="userStats" class="stats-card">Loading...</div>
        <div id="referralLink"></div>
        <button class="back-btn" onclick="logout()">Logout</button>
    </div>
</div>

<script>
    // ====================== FIREBASE CLIENT CONFIG ======================
    // 🔁 REPLACE WITH YOUR OWN FIREBASE WEB APP CONFIG (from Firebase Console)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "earn-bot-2026",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ====================== GLOBALS ======================
    let currentUserId = null;
    let currentUserData = null;

    // ====================== HELPER FUNCTIONS ======================
    async function loadUserDashboard(userId) {
        try {
            const doc = await db.collection('users').doc(userId).get();
            if (!doc.exists) {
                document.getElementById('userStats').innerHTML = '<p class="error">❌ User not found. Please start the bot first: <a href="https://t.me/YourBotUsername">@YourBotUsername</a></p>';
                return;
            }
            const data = doc.data();
            currentUserData = data;
            // Build stats HTML
            const statsHtml = `
                <p><strong>👤 Name:</strong> ${data.name || 'N/A'}</p>
                <p><strong>💰 Balance:</strong> ${data.balance || 0} coins</p>
                <p><strong>👥 Total Refers:</strong> ${data.totalRefers || 0}</p>
                <p><strong>🆔 Telegram ID:</strong> ${userId}</p>
            `;
            document.getElementById('userStats').innerHTML = statsHtml;
            // Build referral link
            const botUsername = "YourBotUsername"; // 🔁 REPLACE WITH YOUR BOT'S USERNAME
            const referralLink = `https://t.me/${botUsername}?start=ref_${userId}`;
            document.getElementById('referralLink').innerHTML = `
                <div class="stats-card">
                    <p><strong>🔗 Your Referral Link:</strong></p>
                    <div class="referral-link">${referralLink}</div>
                    <p style="font-size: 14px; margin-top: 10px;">Share this link with friends – you get 50💰 per join!</p>
                </div>
            `;
        } catch (error) {
            console.error("Error loading user data:", error);
            document.getElementById('userStats').innerHTML = '<p class="error">⚠️ Failed to load data. Check console.</p>';
        }
    }

    function logout() {
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('userDashboard').style.display = 'none';
        currentUserId = null;
        currentUserData = null;
    }

    // ====================== TELEGRAM LOGIN CALLBACK ======================
    window.onTelegramAuth = function(user) {
        // This is called by the Telegram Login Widget after successful login
        currentUserId = user.id.toString();
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('userDashboard').style.display = 'block';
        loadUserDashboard(currentUserId);
    };

    // ====================== INITIALIZE TELEGRAM WIDGET ======================
    // We create the widget dynamically because we need to set the bot username.
    (function() {
        const script = document.createElement('script');
        script.src = "https://telegram.org/js/telegram-widget.js?22";
        script.setAttribute('data-telegram-login', 'YourBotUsername'); // 🔁 REPLACE
        script.setAttribute('data-size', 'large');
        script.setAttribute('data-request-access', 'write');
        script.setAttribute('data-onauth', 'onTelegramAuth(user)');
        document.getElementById('telegram-login').appendChild(script);
    })();
</script>
</body>
</html>
