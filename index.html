<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Bot 2026 - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #0ea5e9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 450px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; text-align: center; }
        .balance-val { font-size: 36px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; color: white; }
        .btn-claim { background: #22c55e; }
        .btn-ad { background: #ef4444; }
        .btn-req { background: linear-gradient(90deg, #0ea5e9, #2563eb); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Sticky Ad Footer */
        #footer-ad { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; padding: 12px; border-top: 2px solid var(--primary); text-align: center; z-index: 1000; }
        #footer-ad a { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 14px; }
        #timer { color: #f59e0b; font-size: 13px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 id="greet">Namaste!</h2>
        <div style="font-size: 14px; opacity: 0.7;">Earn Bot 2026 Balance</div>
        <div class="balance-val">₹<span id="bal">0</span></div>
    </div>

    <button class="btn btn-claim" id="claimBtn" onclick="startTask('DAILY_CLAIM')">
        <i class="fas fa-gift"></i> Claim Daily 10 Points
    </button>

    <div class="card">
        <div id="timer">Please wait <span id="sec">15</span> seconds...</div>
        <button class="btn btn-ad" id="adBtn" onclick="startTask('VIDEO_REWARD')">
            <i class="fas fa-play-circle"></i> Watch Ad (5 Points)
        </button>
    </div>

    <div class="card">
        <input type="text" id="upi" placeholder="Enter UPI ID for withdrawal">
        <button class="btn btn-req" onclick="withdraw()">
            <i class="fas fa-wallet"></i> Request Withdrawal
        </button>
    </div>
</div>

<div id="footer-ad">
    <a href="https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298684c7cea730312add326101b" target="_blank">
        🚀 Click here for Extra Bonus! (Sponsored)
    </a>
</div>

<script>
    const SMART_LINK = "https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298684c7cea730312add326101b";
    
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBxvacIBGHZdQ8HTgHLGku45oEHaVTyRt8",
        authDomain: "earn-bot-2026.firebaseapp.com",
        projectId: "earn-bot-2026",
        storageBucket: "earn-bot-2026.firebasestorage.app",
        messagingSenderId: "519698784421",
        appId: "1:519698784421:web:c932e8ced59c4db1b06d4c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const tg = window.Telegram.WebApp;
    tg.expand();

    const uid = tg.initDataUnsafe?.user?.id?.toString() || "test_user";

    // Live Balance Update
    db.collection("users").doc(uid).onSnapshot((doc) => {
        if (doc.exists) {
            document.getElementById('bal').innerText = doc.data().balance || 0;
            document.getElementById('greet').innerText = "Hi, " + (tg.initDataUnsafe?.user?.first_name || "User");
        }
    });

    function startTask(type) {
        window.open(SMART_LINK, '_blank');
        let timeLeft = 15;
        const btn = document.getElementById('adBtn');
        const timerDiv = document.getElementById('timer');
        const secSpan = document.getElementById('sec');

        timerDiv.style.display = 'block';
        document.getElementById('claimBtn').disabled = true;
        btn.disabled = true;

        const interval = setInterval(() => {
            timeLeft--;
            secSpan.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                timerDiv.style.display = 'none';
                btn.disabled = false;
                document.getElementById('claimBtn').disabled = false;
                // Signal to bot for points
                tg.sendData(JSON.stringify({ action: type }));
            }
        }, 1000);
    }

    async function withdraw() {
        const upiId = document.getElementById('upi').value;
        if(!upiId.includes('@')) return alert("Sahi UPI ID dalein!");
        
        await db.collection("withdrawals").add({
            userId: uid,
            upi: upiId,
            status: "Pending",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Withdrawal request sent! ✅");
    }
</script>
</body>
</html>
