<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Bot 2026 - Dashboard</title>
    <!-- Tailwind CSS for Modern Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-color: #0f172a; 
            color: white; 
            font-family: 'Inter', sans-serif;
            padding-bottom: 100px; /* Space for Social Bar Ads */
        }
        .glass { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .btn-gradient {
            background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto space-y-6 mt-4">
        
        <!-- Header / Balance Section -->
        <div class="glass p-5 rounded-3xl flex justify-between items-center">
            <div>
                <h1 class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    EARN BOT 2026
                </h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">User Dashboard</p>
            </div>
            <div class="text-right">
                <span class="text-xs text-gray-400 block mb-1">Total Balance</span>
                <div class="flex items-center justify-end gap-2">
                    <i class="fas fa-coins text-yellow-400"></i>
                    <span class="text-2xl font-mono font-bold text-yellow-400" id="balance">0.00</span>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-4 rounded-2xl text-center border-b-2 border-blue-500">
                <i class="fas fa-user-friends text-blue-400 mb-1"></i>
                <p class="text-[10px] text-gray-400 uppercase">Referrals</p>
                <p class="text-lg font-bold" id="refer-count">0</p>
            </div>
            <div class="glass p-4 rounded-2xl text-center border-b-2 border-emerald-500">
                <i class="fas fa-check-circle text-emerald-400 mb-1"></i>
                <p class="text-[10px] text-gray-400 uppercase">Tasks Done</p>
                <p class="text-lg font-bold" id="task-count">0</p>
            </div>
        </div>

        <!-- Main Task Area -->
        <div class="glass p-5 rounded-3xl space-y-4">
            <h2 class="text-sm font-semibold text-blue-300 uppercase tracking-tighter mb-2 italic">Fast Tasks</h2>

            <!-- Daily Check-in -->
            <div class="flex justify-between items-center bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-500/20 p-2 rounded-lg"><i class="fas fa-calendar-day text-blue-400"></i></div>
                    <span class="text-sm">Daily Bonus</span>
                </div>
                <button onclick="claimBonus()" id="bonusBtn" class="btn-gradient px-5 py-2 rounded-xl text-xs font-bold shadow-lg shadow-blue-500/20">Claim</button>
            </div>

            <!-- Smart Link Task -->
            <div class="flex justify-between items-center bg-slate-800/50 p-4 rounded-2xl border border-yellow-500/20">
                <div class="flex items-center gap-3">
                    <div class="bg-yellow-500/20 p-2 rounded-lg"><i class="fas fa-bolt text-yellow-500"></i></div>
                    <div>
                        <span class="text-sm block">Smart Ad Task</span>
                        <span class="text-[9px] text-yellow-500 font-bold uppercase">High Reward</span>
                    </div>
                </div>
                <button onclick="watchSmartAd()" class="bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-xl text-xs font-bold transition-all">Watch</button>
            </div>
        </div>

        <!-- Withdraw Button -->
        <div class="pt-2">
            <button onclick="withdraw()" class="w-full bg-gradient-to-r from-yellow-500 to-orange-500 text-black font-black py-4 rounded-2xl shadow-xl shadow-orange-500/20 flex items-center justify-center gap-3">
                <i class="fas fa-wallet text-xl"></i> WITHDRAW NOW
            </button>
        </div>

        <p class="text-center text-[10px] text-gray-500 uppercase tracking-widest">Verified by Adsterra & Google Cloud</p>
    </div>

    <!-- MAIN JAVASCRIPT LOGIC -->
    <script>
        let currentBalance = 0.00;
        let completedTasks = 0;
        
        // YOUR SMART LINK
        const mySmartLink = "https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298684c7cea730312add326101b";

        function updateDisplay() {
            document.getElementById('balance').innerText = currentBalance.toFixed(2);
            document.getElementById('task-count').innerText = completedTasks;
        }

        // Daily Bonus Logic
        function claimBonus() {
            currentBalance += 5.00;
            completedTasks += 1;
            updateDisplay();
            
            const btn = document.getElementById('bonusBtn');
            btn.innerText = "CLAIMED";
            btn.disabled = true;
            btn.classList.replace('btn-gradient', 'bg-gray-700');
            alert("Success: +5.00 Coins added!");
        }

        // Smart Link Ad Logic
        function watchSmartAd() {
            // Open Smart Link
            window.open(mySmartLink, '_blank');
            alert("Ad is loading... Please wait 10 seconds on the ad page to receive points.");

            // Add points after delay
            setTimeout(() => {
                currentBalance += 10.50;
                completedTasks += 1;
                updateDisplay();
                alert("Task Complete: +10.50 Coins added to your wallet!");
            }, 10000);
        }

        // Withdraw Logic
        function withdraw() {
            if(currentBalance < 50) {
                alert("Minimum withdrawal is 50.00 Coins. You need " + (50 - currentBalance).toFixed(2) + " more.");
            } else {
                alert("Withdrawal Request Sent! Payment will be processed within 24 hours.");
            }
        }
    </script>

    <!-- ADSTERRA SOCIAL BAR (Unit ID: 28954124) -->
    <script type='text/javascript' src='//horizontallyresearchpolar.com/9a/47/32/9a47321583a45c36195e34749f7e5025.js'></script>

</body>
</html>
