<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro 2026 | Official System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { background: #070b14; color: #fff; font-family: 'Poppins', sans-serif; transition: 0.3s; }
        .premium-card { background: linear-gradient(145deg, #111827, #1f2937); border: 1px solid rgba(255,255,255,0.05); }
        .coin-gradient { background: linear-gradient(90deg, #facc15, #eab308); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .disabled-btn { background: #1e293b !important; color: #64748b !important; cursor: not-allowed; pointer-events: none; opacity: 0.7; }
        .verify-anim { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <nav class="p-5 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#070b14]/90 backdrop-blur-md z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-600/30 font-bold italic">E</div>
            <span class="font-extrabold text-xl tracking-tighter">EARN<span class="text-blue-500">PRO</span></span>
        </div>
        <div id="displayId" class="text-[10px] font-mono bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20 tracking-tighter">ID: Loading...</div>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-6 mt-2">
        
        <!-- Wallet Card -->
        <div class="premium-card rounded-[2.5rem] p-10 text-center relative overflow-hidden shadow-2xl">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-blue-500/10 blur-3xl"></div>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em] font-bold mb-1">Available Coins</p>
            <h2 class="text-6xl font-black coin-gradient" id="balance">0.00</h2>
            <div class="mt-5 flex justify-center">
                <span class="bg-white/5 px-4 py-1.5 rounded-full text-[9px] text-gray-400 border border-white/5 uppercase tracking-widest">Min. Payout: 200</span>
            </div>
        </div>

        <!-- Task Section -->
        <div class="space-y-4">
            <h3 class="text-[10px] font-bold text-gray-500 px-2 tracking-[0.3em] uppercase">Earning Dashboard</h3>
            
            <!-- 24H Daily Bonus -->
            <div class="premium-card p-5 rounded-3xl flex justify-between items-center group border-l-4 border-blue-500">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 transition group-hover:scale-110"><i class="fas fa-gift text-xl"></i></div>
                    <div><p class="text-sm font-bold">Daily Reward</p><p class="text-[10px] text-blue-400">+5.00 Coins</p></div>
                </div>
                <button onclick="startDailyBonus()" id="dailyBtn" class="bg-blue-600 text-white px-6 py-2.5 rounded-2xl text-xs font-black transition active:scale-95 shadow-lg shadow-blue-600/20">Claim</button>
            </div>

            <!-- Video Ad with 15s Verification -->
            <div class="premium-card p-5 rounded-3xl flex flex-col gap-4 border-l-4 border-yellow-500">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-yellow-500/10 rounded-2xl flex items-center justify-center text-yellow-500"><i class="fas fa-play-circle text-2xl"></i></div>
                        <div><p class="text-sm font-bold">Video Ad Task</p><p class="text-[10px] text-yellow-500 font-bold uppercase tracking-tighter">+10.00 Coins</p></div>
                    </div>
                    <button onclick="startVideoAd()" id="adBtn" class="bg-yellow-500 text-black px-6 py-2.5 rounded-2xl text-xs font-black transition active:scale-95 shadow-lg shadow-yellow-500/20">Watch</button>
                </div>
                
                <!-- Verification Progress (Hidden initially) -->
                <div id="adVerification" class="hidden bg-black/40 p-4 rounded-2xl text-center border border-white/5">
                    <p class="text-[10px] text-gray-400 mb-2 uppercase tracking-widest">Ad Verification in progress...</p>
                    <div class="text-3xl font-black verify-anim text-yellow-500" id="timerDisplay">15s</div>
                    <div id="claimArea" class="hidden mt-3">
                         <button onclick="claimVideoReward()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-xs animate-bounce shadow-lg shadow-green-600/20">COLLECT 10 COINS</button>
                    </div>
                </div>
            </div>

            <!-- Share & Refer Code -->
            <div class="premium-card p-6 rounded-[2rem] text-center space-y-4 border-2 border-dashed border-gray-700">
                <div>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Your Invitation Code</p>
                    <h4 class="text-3xl font-mono font-black text-blue-400 tracking-widest" id="myReferCode">...</h4>
                </div>
                <button onclick="shareLink()" class="w-full bg-white/5 border border-white/10 py-4 rounded-2xl text-white font-bold text-xs flex items-center justify-center gap-2 hover:bg-white hover:text-black transition-all">
                    <i class="fas fa-paper-plane text-blue-400"></i> SHARE ON WHATSAPP (+15)
                </button>
            </div>
        </div>

        <!-- Withdraw Funds -->
        <button onclick="handleWithdraw()" class="w-full bg-white text-black font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all text-sm uppercase tracking-widest">
            <i class="fas fa-wallet mr-2"></i> Withdraw Now
        </button>
    </div>

    <!-- Firebase Logic -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgydPo6mM6qmWP8vVW-l05SC1qtNXodV8",
            projectId: "earn-bot-2026",
            databaseURL: "https://earn-bot-2026-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SMART_LINK = "https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298684c7cea730312add326101b";

        let myId = localStorage.getItem('user_unique_id');
        if(!myId) {
            myId = "EP-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('user_unique_id', myId);
        }
        document.getElementById('displayId').innerText = "ID: " + myId;
        document.getElementById('myReferCode').innerText = myId;

        // Sync Dashboard
        db.ref('users/' + myId).on('value', (s) => {
            const data = s.val() || { balance: 0, lastAd: 0, lastDaily: 0 };
            document.getElementById('balance').innerText = data.balance.toFixed(2);
            updateAllTimers(data.lastAd, data.lastDaily);
        });

        // --- Video Ad Logic (15s Verification) ---
        function startVideoAd() {
            window.open(SMART_LINK, '_blank');
            const adBtn = document.getElementById('adBtn');
            const verifyArea = document.getElementById('adVerification');
            const timerEl = document.getElementById('timerDisplay');
            const claimArea = document.getElementById('claimArea');

            adBtn.classList.add('hidden');
            verifyArea.classList.remove('hidden');
            
            let count = 15;
            const timer = setInterval(() => {
                count--;
                timerEl.innerText = count + "s";
                if(count <= 0) {
                    clearInterval(timer);
                    timerEl.classList.add('hidden');
                    claimArea.classList.remove('hidden');
                }
            }, 1000);
        }

        function claimVideoReward() {
            db.ref('users/' + myId).update({
                balance: firebase.database.ServerValue.increment(10),
                lastAd: firebase.database.ServerValue.TIMESTAMP
            });
            alert("10 Coins Verified & Added!");
            location.reload(); 
        }

        // --- Daily Bonus Logic (24H Timer) ---
        function startDailyBonus() {
            window.open(SMART_LINK, '_blank');
            db.ref('users/' + myId).update({
                balance: firebase.database.ServerValue.increment(5),
                lastDaily: firebase.database.ServerValue.TIMESTAMP
            });
            alert("Daily Bonus +5.00 Claimed!");
        }

        // --- Timer Handlers ---
        function updateAllTimers(lastAd, lastDaily) {
            const now = Date.now();
            
            // Ad Timer (10m)
            const adDiff = (lastAd + 600000) - now;
            const adBtn = document.getElementById('adBtn');
            if(adDiff > 0) {
                adBtn.disabled = true; adBtn.classList.add('disabled-btn');
                adBtn.innerText = Math.ceil(adDiff/60000) + "m Left";
            }

            // Daily Timer (24h)
            const dailyDiff = (lastDaily + 86400000) - now;
            const dailyBtn = document.getElementById('dailyBtn');
            if(dailyDiff > 0) {
                dailyBtn.disabled = true; dailyBtn.classList.add('disabled-btn');
                const hrs = Math.floor(dailyDiff/3600000);
                dailyBtn.innerText = hrs + "h Left";
            }
        }

        function shareLink() {
            const text = `Join EarnPro 2026 and earn daily! Use code ${myId} for extra points. Link: ${window.location.href}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        }

        function handleWithdraw() { alert("Minimum 200 Coins required for verification!"); }
    </script>

    <!-- Social Bar Ad -->
    <script type='text/javascript' src='//horizontallyresearchpolar.com/9a/47/32/9a47321583a45c36195e34749f7e5025.js'></script>
</body>
</html>
