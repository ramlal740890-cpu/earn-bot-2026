<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Bot 2026 - Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        // ✅ Aapki Asli Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBxvacIBGHZdQ8HTgHLGku45oEHaVTyRt8",
            authDomain: "earn-bot-2026.firebaseapp.com",
            projectId: "earn-bot-2026",
            storageBucket: "earn-bot-2026.firebasestorage.app",
            messagingSenderId: "519698784421",
            appId: "1:519698784421:web:c932e8ced59c4db1b06d4c"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Get User ID
        const user = tg.initDataUnsafe.user;
        const userId = user ? user.id.toString() : "test_user";

        // 💰 Real-time Balance Fetching Logic
        function loadUserData() {
            db.collection("users").doc(userId).onSnapshot((doc) => {
                if (doc.exists) {
                    document.getElementById("balance").innerText = doc.data().balance || 0;
                } else {
                    document.getElementById("balance").innerText = "0";
                }
            }, (error) => {
                console.error("Firebase Error:", error);
            });
        }

        window.onload = loadUserData;
    </script>

    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-premium { transition: all 0.3s ease; }
        .btn-premium:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold gradient-text">Earn Bot 2026</h1>
        <p class="italic text-gray-400 mt-2 text-sm" id="motivationText">"Mehnat ka phal aur bot ka paisa, dono zaroor milta hai!"</p>
    </div>

    <div class="glass-card rounded-3xl p-8 text-center shadow-2xl mb-6">
        <p class="text-gray-400 text-sm uppercase tracking-widest font-semibold">Aapka Balance</p>
        <h2 class="text-6xl font-extrabold mt-3 text-white">₹<span id="balance">0</span></h2>
    </div>

    <div class="space-y-4">
        <button id="claimBtn" onclick="collectBonus()" class="btn-premium w-full bg-green-600 p-5 rounded-2xl flex items-center justify-between font-bold shadow-lg">
            <span><i class="fas fa-gift mr-2"></i> Daily Bonus</span>
            <span class="bg-white text-green-700 px-3 py-1 rounded-xl text-xs font-black">+10</span>
        </button>

        <button id="adBtn" onclick="startAdTask()" class="btn-premium w-full bg-indigo-600 p-5 rounded-2xl flex items-center justify-between font-bold shadow-lg">
            <span><i class="fas fa-play-circle mr-2"></i> Watch Premium Ad</span>
            <span id="timer" class="hidden text-xs bg-red-500 px-3 py-1 rounded-lg">Wait <span id="sec">15</span>s</span>
            <span id="adPoints" class="bg-white text-indigo-700 px-3 py-1 rounded-xl text-xs font-black">+5</span>
        </button>
    </div>

    <div class="glass-card rounded-2xl p-5 mt-6">
        <h3 class="text-sm font-bold mb-4 text-gray-300">Withdraw (UPI)</h3>
        <input type="text" id="upiId" placeholder="Enter UPI ID (e.g. name@apl)" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-sm focus:outline-none mb-4">
        <button onclick="requestWithdraw()" class="w-full bg-blue-600 p-4 rounded-xl font-black text-sm uppercase">Request Payout</button>
    </div>

    <div class="mt-8 bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-3xl text-center shadow-xl">
        <p class="text-xs font-black mb-3 text-blue-400 uppercase">Jitne zyada share utna zyada paisa!</p>
        <button onclick="shareLink()" class="bg-white text-black px-10 py-3 rounded-full font-black text-sm hover:bg-gray-200 shadow-lg">Share & Earn</button>
    </div>

    <script>
        // ✅ Aapka Asli Ad Link
        const SMART_LINK = "https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298b84c7cea730312add326101b";

        function startAdTask() {
            window.open(SMART_LINK, '_blank');
            let timeLeft = 15;
            const btn = document.getElementById('adBtn');
            const timer = document.getElementById('timer');
            const sec = document.getElementById('sec');
            const pointsLabel = document.getElementById('adPoints');

            btn.disabled = true;
            timer.classList.remove('hidden');
            pointsLabel.classList.add('hidden');

            const countdown = setInterval(() => {
                timeLeft--;
                sec.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timer.classList.add('hidden');
                    pointsLabel.classList.remove('hidden');
                    btn.disabled = false;
                    
                    tg.sendData(JSON.stringify({ action: 'ad_watch', points: 5 }));
                    tg.showAlert("Mubarak ho! 5 Points add kar diye gaye hain.");
                }
            }, 1000);
        }

        function collectBonus() {
            tg.sendData(JSON.stringify({ action: 'daily_bonus', points: 10 }));
            document.getElementById('claimBtn').disabled = true;
            document.getElementById('claimBtn').classList.add('opacity-50');
            tg.showAlert("Daily 10 points collected!");
        }

        function requestWithdraw() {
            const upi = document.getElementById('upiId').value;
            if(!upi) return tg.showAlert("Please enter UPI ID");
            tg.sendData(JSON.stringify({ action: 'withdraw', upi: upi }));
            tg.showAlert("Withdrawal request sent!");
        }

        function shareLink() {
            const shareUrl = `https://t.me/Earn_Bot_2026_bot?start=${userId}`;
            const text = encodeURIComponent("Bhai, iss bot se main daily kama raha hoon! Tu bhi join kar. Link: ");
            window.open(`https://t.me/share/url?url=${shareUrl}&text=${text}`);
        }
    </script>
</body>
</html>
