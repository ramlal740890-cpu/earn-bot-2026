<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro 2026 | User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { background: #070b14; color: #fff; font-family: 'Poppins', sans-serif; }
        .premium-card { background: linear-gradient(145deg, #111827, #1f2937); border: 1px solid rgba(255,255,255,0.05); }
        .coin-shimmer { background: linear-gradient(90deg, #facc15, #eab308, #facc15); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .disabled-btn { background: #374151 !important; cursor: not-allowed; opacity: 0.6; pointer-events: none; }
    </style>
</head>
<body class="pb-24">

    <!-- Navbar -->
    <nav class="p-5 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg"><i class="fas fa-bolt"></i></div>
            <span class="font-extrabold text-xl tracking-tighter uppercase">Earn<span class="text-blue-500">Pro</span></span>
        </div>
        <div class="text-[10px] bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full border border-blue-500/20">LIVE SYNC ON</div>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Wallet Card -->
        <div class="premium-card rounded-[2.5rem] p-10 text-center relative">
            <p class="text-gray-500 text-xs uppercase tracking-widest mb-1">Your Earnings</p>
            <h2 class="text-6xl font-black coin-shimmer" id="balance">0.00</h2>
            <div class="mt-4 inline-block bg-white/5 px-4 py-1 rounded-full text-[10px] text-gray-400">
                Min. Withdraw: 200 Coins
            </div>
        </div>

        <!-- Task List -->
        <div class="space-y-4">
            <h3 class="text-xs font-bold text-gray-500 px-2 tracking-widest">EARNING MISSIONS</h3>
            
            <!-- Daily Bonus -->
            <div class="premium-card p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-500/20 rounded-xl flex items-center justify-center text-blue-500"><i class="fas fa-calendar-check"></i></div>
                    <div><p class="text-sm font-bold">Daily Bonus</p><p class="text-[10px] text-blue-400">+5 Coins</p></div>
                </div>
                <button onclick="handleDaily()" id="dailyBtn" class="bg-blue-600 px-5 py-2 rounded-xl text-xs font-bold">Claim</button>
            </div>

            <!-- Ad Task -->
            <div class="premium-card p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-yellow-500/20 rounded-xl flex items-center justify-center text-yellow-500"><i class="fas fa-play"></i></div>
                    <div><p class="text-sm font-bold">Video Ad</p><p class="text-[10px] text-yellow-400">+10 Coins</p></div>
                </div>
                <button onclick="handleAdTask()" id="adBtn" class="bg-yellow-500 text-black px-5 py-2 rounded-xl text-xs font-bold">Watch</button>
            </div>

            <!-- Share Task -->
            <div class="premium-card p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center text-emerald-500"><i class="fas fa-share-alt"></i></div>
                    <div><p class="text-sm font-bold">Share & Earn</p><p class="text-[10px] text-emerald-400">+15 Coins</p></div>
                </div>
                <button onclick="handleShare()" class="bg-emerald-600 px-5 py-2 rounded-xl text-xs font-bold">Share</button>
            </div>
        </div>

        <button onclick="handleWithdraw()" class="w-full bg-white text-black font-black py-5 rounded-2xl shadow-xl active:scale-95 transition">
            WITHDRAW 200 COINS
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgydPo6mM6qmWP8vVW-l05SC1qtNXodV8",
            projectId: "earn-bot-2026",
            databaseURL: "https://earn-bot-2026-default-rtdb.firebaseio.com",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userId = "user_" + Math.floor(Math.random() * 1000); // Production mein unique ID use karein

        const smartLink = "https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298684c7cea730312add326101b";

        db.ref('users/' + userId).on('value', (s) => {
            const d = s.val() || { balance: 0, lastAd: 0, lastDaily: 0 };
            document.getElementById('balance').innerText = d.balance.toFixed(2);
            updateTimers(d.lastAd, d.lastDaily);
        });

        function handleDaily() {
            window.open(smartLink, '_blank');
            db.ref('users/' + userId).update({
                balance: firebase.database.ServerValue.increment(5),
                lastDaily: Date.now()
            });
        }

        function handleAdTask() {
            window.open(smartLink, '_blank');
            db.ref('users/' + userId).update({
                balance: firebase.database.ServerValue.increment(10),
                lastAd: Date.now()
            });
        }

        function handleShare() {
            const shareText = "Join EarnPro 2026 and earn daily coins! " + window.location.href;
            if (navigator.share) {
                navigator.share({ title: 'EarnPro', text: shareText, url: window.location.href })
                .then(() => {
                    db.ref('users/' + userId).update({ balance: firebase.database.ServerValue.increment(15) });
                    alert("Shared successfully! +15 Coins.");
                });
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`, '_blank');
                db.ref('users/' + userId).update({ balance: firebase.database.ServerValue.increment(15) });
            }
        }

        function updateTimers(lastAd, lastDaily) {
            const now = Date.now();
            // Ad Timer (10 min)
            const adDiff = (lastAd + 600000) - now;
            const adBtn = document.getElementById('adBtn');
            if(adDiff > 0) {
                adBtn.disabled = true; adBtn.classList.add('disabled-btn');
                adBtn.innerText = Math.floor(adDiff/60000) + "m left";
            } else { adBtn.disabled = false; adBtn.classList.remove('disabled-btn'); adBtn.innerText = "Watch"; }

            // Daily Timer (24 hr)
            const dDiff = (lastDaily + 86400000) - now;
            const dBtn = document.getElementById('dailyBtn');
            if(dDiff > 0) {
                dBtn.disabled = true; dBtn.classList.add('disabled-btn');
                dBtn.innerText = Math.floor(dDiff/3600000) + "h left";
            } else { dBtn.disabled = false; dBtn.classList.remove('disabled-btn'); dBtn.innerText = "Claim"; }
        }

        function handleWithdraw() { alert("Request sent to admin for verification."); }
    </script>
</body>
</html>
