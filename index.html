<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro 2026 | User Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { background: #070b14; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .premium-card { background: linear-gradient(145deg, #111827, #1f2937); border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .coin-shimmer { background: linear-gradient(90deg, #facc15, #eab308, #facc15); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        .disabled-btn { background: #374151 !important; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body class="pb-24">

    <!-- Top Navigation -->
    <nav class="p-5 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-600/30">
                <i class="fas fa-bolt text-sm"></i>
            </div>
            <span class="font-extrabold tracking-tighter text-xl">EARN<span class="text-blue-500">PRO</span></span>
        </div>
        <div class="bg-slate-800/50 px-3 py-1 rounded-full border border-white/10 text-xs">
            <span class="text-green-500">●</span> Server Online
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Main Wallet Card -->
        <div class="premium-card rounded-[2rem] p-8 text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/10 blur-3xl"></div>
            <p class="text-gray-400 text-xs uppercase tracking-[0.2em] mb-2">Current Assets</p>
            <h2 class="text-5xl font-extrabold coin-shimmer" id="balance">0.00</h2>
            <p class="text-[10px] text-gray-500 mt-2 italic">Min. Withdrawal: 200 Coins</p>
        </div>

        <!-- Task Grid -->
        <div class="space-y-4">
            <h3 class="text-sm font-semibold text-gray-400 ml-2">AVAILABLE MISSIONS</h3>
            
            <!-- Daily Bonus -->
            <div class="premium-card p-5 rounded-2xl flex justify-between items-center group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-500 group-hover:scale-110 transition">
                        <i class="fas fa-gift text-xl"></i>
                    </div>
                    <div>
                        <p class="font-bold text-sm">Daily Reward</p>
                        <p class="text-[10px] text-blue-400 font-medium">+5 Coins</p>
                    </div>
                </div>
                <button onclick="handleDaily()" id="dailyBtn" class="bg-blue-600 hover:bg-blue-50 text-white px-6 py-2 rounded-xl text-xs font-bold transition-all shadow-lg shadow-blue-600/20">Claim</button>
            </div>

            <!-- Ad Task with Timer -->
            <div class="premium-card p-5 rounded-2xl flex justify-between items-center group">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-xl bg-yellow-500/10 flex items-center justify-center text-yellow-500 group-hover:scale-110 transition">
                        <i class="fas fa-play-circle text-xl"></i>
                    </div>
                    <div>
                        <p class="font-bold text-sm">Smart Ad Mission</p>
                        <p class="text-[10px] text-yellow-500 font-medium">+10 Coins</p>
                    </div>
                </div>
                <div class="text-right">
                    <button onclick="handleAdTask()" id="adBtn" class="bg-yellow-500 hover:bg-yellow-400 text-black px-6 py-2 rounded-xl text-xs font-bold transition-all">Watch</button>
                    <p id="timerText" class="text-[9px] text-gray-500 mt-1 hidden italic">Next in: <span id="countdown">10:00</span></p>
                </div>
            </div>
        </div>

        <!-- Withdrawal Section -->
        <button onclick="handleWithdraw()" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-gray-200 transition-transform active:scale-95 flex items-center justify-center gap-3 shadow-xl">
            <i class="fas fa-wallet"></i> WITHDRAW FUNDS
        </button>

    </div>

    <!-- Firebase Logic -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgydPo6mM6qmWP8vVW-l05SC1qtNXodV8",
            projectId: "earn-bot-2026",
            databaseURL: "https://earn-bot-2026-default-rtdb.firebaseio.com",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userId = "user_test_1"; // In production, use unique ID

        // Load Realtime Data
        db.ref('users/' + userId).on('value', (snapshot) => {
            const data = snapshot.val() || { balance: 0, lastAdTime: 0 };
            document.getElementById('balance').innerText = data.balance.toFixed(2);
            checkAdCooldown(data.lastAdTime);
        });

        function handleDaily() {
            // Clame par ad dikhane ke liye smart link open karein
            window.open("https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298684c7cea730312add326101b", "_blank");
            db.ref('users/' + userId).transaction(u => {
                if(u) { u.balance += 5; }
                return u;
            });
            alert("Daily Bonus Claimed! +5 Coins");
        }

        function handleAdTask() {
            window.open("https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298684c7cea730312add326101b", "_blank");
            const now = Date.now();
            db.ref('users/' + userId).update({
                balance: firebase.database.ServerValue.increment(10),
                lastAdTime: now
            });
            alert("Great! 10 Points added. Now wait for 10 minutes.");
        }

        function checkAdCooldown(lastTime) {
            const adBtn = document.getElementById('adBtn');
            const timerText = document.getElementById('timerText');
            const countdownEl = document.getElementById('countdown');
            
            const interval = setInterval(() => {
                const now = Date.now();
                const diff = (lastTime + (10 * 60 * 1000)) - now;

                if (diff > 0) {
                    adBtn.disabled = true;
                    adBtn.classList.add('disabled-btn');
                    timerText.classList.remove('hidden');
                    const mins = Math.floor(diff / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    countdownEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                } else {
                    adBtn.disabled = false;
                    adBtn.classList.remove('disabled-btn');
                    timerText.classList.add('hidden');
                    clearInterval(interval);
                }
            }, 1000);
        }

        function handleWithdraw() {
            db.ref('users/' + userId + '/balance').once('value', (s) => {
                if (s.val() >= 200) {
                    alert("Request Sent! Admin will verify your 200+ coins.");
                } else {
                    alert("Minimum 200 coins required!");
                }
            });
        }
    </script>

    <!-- Social Bar -->
    <script type='text/javascript' src='//horizontallyresearchpolar.com/9a/47/32/9a47321583a45c36195e34749f7e5025.js'></script>
</body>
</html>
