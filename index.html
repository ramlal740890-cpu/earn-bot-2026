<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPro 2026 | Verified Earnings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { background: #070b14; color: #fff; font-family: 'Poppins', sans-serif; }
        .premium-card { background: linear-gradient(145deg, #111827, #1f2937); border: 1px solid rgba(255,255,255,0.05); }
        .disabled-btn { background: #374151 !important; opacity: 0.6; pointer-events: none; }
        .verify-timer { animation: pulse 1s infinite; color: #facc15; font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="pb-20">

    <nav class="p-5 border-b border-white/5 flex justify-between items-center">
        <span class="font-bold text-xl tracking-tighter uppercase">Earn<span class="text-blue-500">Pro</span></span>
        <div id="userTag" class="text-[10px] bg-blue-500/20 px-3 py-1 rounded-full text-blue-400 font-mono">ID: ...</div>
    </nav>

    <div class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Balance Card -->
        <div class="premium-card rounded-[2.5rem] p-10 text-center shadow-2xl">
            <p class="text-gray-500 text-xs uppercase tracking-widest mb-1">Live Balance</p>
            <h2 class="text-6xl font-black text-yellow-400" id="balance">0.00</h2>
            <p class="text-[10px] text-gray-500 mt-3 italic">Withdraw Limit: 200 Coins</p>
        </div>

        <!-- Task Section -->
        <div class="space-y-4">
            <h3 class="text-xs font-bold text-gray-500 px-2 tracking-widest">ACTIVE MISSIONS</h3>
            
            <!-- Video Ad Task -->
            <div class="premium-card p-5 rounded-3xl border border-white/5 relative overflow-hidden">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-yellow-500/10 rounded-2xl flex items-center justify-center text-yellow-500"><i class="fas fa-play-circle text-2xl"></i></div>
                        <div>
                            <p class="font-bold text-sm">Watch & Verify</p>
                            <p class="text-[10px] text-yellow-500">+10.00 Coins</p>
                        </div>
                    </div>
                    <div id="adActionArea">
                        <button onclick="startAdProcess()" id="watchBtn" class="bg-yellow-500 text-black px-6 py-2.5 rounded-xl text-xs font-black transition active:scale-95">Watch</button>
                    </div>
                </div>
                
                <!-- Countdown Overlay (Hidden by default) -->
                <div id="verifyOverlay" class="hidden mt-4 pt-4 border-t border-white/5 text-center">
                    <p class="text-[11px] text-gray-400 mb-2">Verifying ad view... Stay on page</p>
                    <div class="text-2xl verify-timer" id="vTimer">15s</div>
                </div>
            </div>

            <!-- Share & Refer -->
            <div class="premium-card p-6 rounded-3xl border-2 border-dashed border-blue-500/30 text-center">
                <p class="text-[10px] text-gray-500 mb-1 uppercase font-bold">Your Refer Code</p>
                <h4 class="text-2xl font-mono font-black text-blue-400 tracking-widest mb-4" id="myCode">...</h4>
                <button onclick="shareApp()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold text-sm shadow-lg shadow-blue-600/20 active:scale-95 transition">
                    <i class="fas fa-share-alt mr-2"></i> INVITE FRIENDS (+15)
                </button>
            </div>
        </div>

        <!-- Withdraw -->
        <button onclick="handleWithdraw()" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase tracking-widest active:scale-95 transition">Withdraw Funds</button>
    </div>

    <script>
        // 1. CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCgydPo6mM6qmWP8vVW-l05SC1qtNXodV8",
            projectId: "earn-bot-2026",
            databaseURL: "https://earn-bot-2026-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const AD_URL = "https://horizontallyresearchpolar.com/r0wbx3kyf?key=8b0a2298684c7cea730312add326101b";

        // 2. USER SYSTEM
        let myId = localStorage.getItem('earn_id');
        if(!myId) {
            myId = "EP-" + Math.floor(1000 + Math.random() * 9000);
            localStorage.setItem('earn_id', myId);
        }
        document.getElementById('userTag').innerText = "ID: " + myId;
        document.getElementById('myCode').innerText = myId;

        // 3. SYNC BALANCE
        db.ref('users/' + myId).on('value', (s) => {
            const data = s.val() || { balance: 0, lastAd: 0 };
            document.getElementById('balance').innerText = data.balance.toFixed(2);
            checkCooldown(data.lastAd);
        });

        // 4. AD PROCESS WITH 15s TIMER
        function startAdProcess() {
            // Open Ad in new tab
            window.open(AD_URL, '_blank');
            
            // Show verification timer
            const watchBtn = document.getElementById('watchBtn');
            const overlay = document.getElementById('verifyOverlay');
            const vTimer = document.getElementById('vTimer');
            
            watchBtn.classList.add('hidden');
            overlay.classList.remove('hidden');

            let timeLeft = 15;
            const timerInterval = setInterval(() => {
                timeLeft--;
                vTimer.innerText = timeLeft + "s";

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    // Show Claim Button
                    document.getElementById('adActionArea').innerHTML = `<button onclick="claimAdPoints()" class="bg-green-600 text-white px-6 py-2.5 rounded-xl text-xs font-black animate-bounce">Claim 10 Coins</button>`;
                    overlay.innerHTML = `<p class="text-green-500 font-bold text-xs">Ad Verified! Click Claim above.</p>`;
                }
            }, 1000);
        }

        function claimAdPoints() {
            db.ref('users/' + myId).update({
                balance: firebase.database.ServerValue.increment(10),
                lastAd: Date.now()
            });
            alert("Success! 10 Coins Added.");
            // Reset button to Watch (but it will be disabled by cooldown)
            location.reload(); 
        }

        function checkCooldown(lastAd) {
            const now = Date.now();
            const diff = (lastAd + 600000) - now; // 10 min
            if(diff > 0) {
                const btn = document.getElementById('watchBtn');
                btn.disabled = true;
                btn.classList.add('disabled-btn');
                btn.innerText = Math.ceil(diff/60000) + "m Left";
            }
        }

        function shareApp() {
            const text = `Join EarnPro 2026! Use my code ${myId} for 5 Coins. Link: ${window.location.href}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        }

        function handleWithdraw() { alert("Min. 200 Coins required!"); }
    </script>

    <!-- Social Bar -->
    <script type='text/javascript' src='//horizontallyresearchpolar.com/9a/47/32/9a47321583a45c36195e34749f7e5025.js'></script>
</body>
</html>
